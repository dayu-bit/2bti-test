<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2BTI - 鬼畜全明星人格测试</title>
<style>
:root {
  --primary: #667eea;
  --secondary: #764ba2;
  --accent: #f093fb;
  --bg: #0f0f1a;
  --card: rgba(255,255,255,0.08);
  --text: #ffffff;
  --text-muted: rgba(255,255,255,0.6);
  --border: rgba(255,255,255,0.15);
  --radius: 20px;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 背景粒子 */
.bg-particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  opacity: 0.3;
  animation: float 8s infinite ease-in-out;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-30px) rotate(180deg); }
}

/* 屏幕容器 */
.screen {
  display: none;
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 20px 16px 100px;
}
.screen.active { display: block; animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* 封面 */
.cover {
  text-align: center;
  padding-top: 60px;
}
.cover-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 30px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4); }
  50% { box-shadow: 0 0 0 15px rgba(102, 126, 234, 0); }
}
.cover-icon {
  width: 120px; height: 120px;
  margin: 0 auto 30px;
  position: relative;
}
.cover-icon::before {
  content: '';
  position: absolute;
  inset: -10px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  animation: spin 8s linear infinite;
}
.cover-icon::after {
  content: '🎭';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  border-radius: 50%;
  background: var(--bg);
}
@keyframes spin { to { transform: rotate(360deg); } }
.cover-title {
  font-size: 48px;
  font-weight: 800;
  background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  letter-spacing: 4px;
}
.cover-subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 40px;
}
.cover-desc {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.8;
  margin-bottom: 40px;
  padding: 0 20px;
}
.cover-stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 40px;
}
.stat {
  text-align: center;
}
.stat-num {
  font-size: 24px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.btn-start {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  border: none;
  padding: 16px 60px;
  border-radius: 50px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 10px 40px rgba(102, 126, 234, 0.4);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-start:active { transform: scale(0.95); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3); }

/* 题目页面 */
.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.q-num {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 500;
}
.q-progress {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  margin-left: 20px;
  overflow: hidden;
}
.q-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 6px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.q-card {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: var(--radius);
  padding: 32px 28px;
  margin-bottom: 28px;
  backdrop-filter: blur(10px);
}
.q-title {
  font-size: 24px;
  font-weight: 700;
  line-height: 1.6;
  margin-bottom: 8px;
  color: #fff;
}
.q-subtitle {
  font-size: 13px;
  color: var(--text-muted);
}
.options { display: flex; flex-direction: column; gap: 12px; }
.opt {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 22px;
  font-size: 17px;
  line-height: 1.6;
  cursor: pointer;
  transition: all 0.3s ease;
  text-align: left;
  width: 100%;
  position: relative;
  overflow: hidden;
  color: #fff;
}
.opt::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, var(--primary), var(--accent));
  opacity: 0;
  transition: opacity 0.3s;
}
.opt:active { transform: scale(0.98); }
.opt.selected {
  border-color: var(--primary);
  background: rgba(102, 126, 234, 0.15);
}
.opt.selected::before { opacity: 1; }

/* 加载动画 */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.loading-overlay.active {
  opacity: 1;
  pointer-events: auto;
}
.loader {
  width: 60px; height: 60px;
  border: 4px solid var(--card);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.loading-text {
  margin-top: 20px;
  font-size: 15px;
  color: var(--text-muted);
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

/* 结果页 */
.result {
  text-align: center;
  padding-top: 40px;
}
.result-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  padding: 6px 18px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.result-avatar {
  width: 140px; height: 140px;
  margin: 0 auto 24px;
  position: relative;
}
.result-avatar::before {
  content: '';
  position: absolute;
  inset: -8px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 50%;
  animation: spin 4s linear infinite;
  z-index: -1;
}
.result-avatar-inner {
  width: 100%; height: 100%;
  background: var(--bg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
}
.result h2 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #fff, var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.result-subtitle {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 30px;
}
.result-desc {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  text-align: left;
  font-size: 15px;
  line-height: 1.9;
  color: rgba(255,255,255,0.85);
  margin-bottom: 24px;
}
.result-match {
  background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}
.match-title {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.match-bar {
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 8px;
}
.match-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 4px;
  transition: width 1s ease;
}
.match-text {
  font-size: 20px;
  font-weight: 700;
}
.result-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 30px;
}
.result-tag {
  background: var(--card);
  border: 1px solid var(--border);
  font-size: 13px;
  padding: 8px 16px;
  border-radius: 50px;
  color: var(--text-muted);
}
.btn-group {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.btn-retry {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  color: white;
  border: none;
  padding: 14px 32px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.btn-share {
  background: transparent;
  border: 1.5px solid var(--border);
  color: white;
  padding: 14px 32px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
}

/* 底部进度指示 */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(15,15,26,0.95);
  backdrop-filter: blur(10px);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border);
  z-index: 10;
}
.nav-dots {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  max-width: 200px;
  scrollbar-width: none;
}
.nav-dots::-webkit-scrollbar { display: none; }
.nav-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  flex-shrink: 0;
  transition: all 0.3s;
}
.nav-dot.done { background: var(--primary); }
.nav-dot.current { background: var(--accent); width: 24px; border-radius: 4px; }
.nav-info { font-size: 12px; color: var(--text-muted); }
</style>
</head>

// ====== 逻辑变量 ======
let answers = [];
let currentQ = 0;

// 生成粒子背景
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 100 + 50;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 5 + 's';
    p.style.animationDuration = (Math.random() * 5 + 6) + 's';
    container.appendChild(p);
  }
}

// 开始测试
function startTest() {
  document.getElementById('screen-cover').classList.remove('active');
  document.getElementById('loading').classList.add('active');
  
  setTimeout(() => {
    document.getElementById('loading').classList.remove('active');
    renderQuestion(0);
  }, 2000);
}

// 渲染题目
function renderQuestion(index) {
  // 移除之前的题目屏幕
  const oldScreen = document.getElementById('screen-q');
  if (oldScreen) oldScreen.remove();
  
  const q = questions[index];
  const progress = ((index + 1) / questions.length * 100).toFixed(0);
  
  const screen = document.createElement('div');
  screen.className = 'screen active';
  screen.id = 'screen-q';
  screen.innerHTML = `
    <div class="q-header">
      <span class="q-num">第 ${index + 1} / ${questions.length} 题</span>
      <div class="q-progress">
        <div class="q-progress-fill" style="width:${progress}%"></div>
      </div>
    </div>
    <div class="q-card">
      <div class="q-title">${q.title}</div>
    </div>
    <div class="options">
      ${q.opts.map((opt, i) => `
        <button class="opt" onclick="selectOpt(${index}, ${i})">${opt}</button>
      `).join('')}
    </div>
  `;
  
  document.body.insertBefore(screen, document.getElementById('loading'));
  
  // 添加底部导航
  renderBottomNav(index);
}

// 底部导航
function renderBottomNav(index) {
  let nav = document.querySelector('.bottom-nav');
  if (!nav) {
    nav = document.createElement('div');
    nav.className = 'bottom-nav';
    document.body.appendChild(nav);
  }
  
  let dots = '';
  const showDots = 10;
  const start = Math.max(0, index - Math.floor(showDots / 2));
  const end = Math.min(questions.length, start + showDots);
  
  for (let i = start; i < end; i++) {
    let cls = 'nav-dot';
    if (i < index) cls += ' done';
    if (i === index) cls += ' current';
    dots += `<div class="${cls}"></div>`;
  }
  
  nav.innerHTML = `
    <div class="nav-dots">${dots}</div>
    <div class="nav-info">${index + 1} / ${questions.length}</div>
  `;
}

// 选择选项
function selectOpt(qIndex, optIndex) {
  answers.push(optIndex);
  
  // 标记选中
  const btns = document.querySelectorAll(`#screen-q .opt`);
  btns.forEach((b, i) => {
    b.classList.toggle('selected', i === optIndex);
  });
  
  setTimeout(() => {
    if (qIndex < questions.length - 1) {
      renderQuestion(qIndex + 1);
    } else {
      showResult();
    }
  }, 400);
}

// 计算结果
function calcResult() {
  // 计分：每道题4个选项，对应不同的结果倾向
  // 简化版：统计各选项分布
  const scores = new Array(results.length).fill(0);
  
  // 定义每道题的选项对应哪些结果（简化逻辑）
  answers.forEach((ans, q) => {
    // 基础分配：前8题偏向某些人格，后12题偏向另一些
    const baseIdx = (q * 8 + ans * 4) % results.length;
    scores[baseIdx] += 3;
    scores[(baseIdx + 1) % results.length] += 2;
    scores[(baseIdx + 2) % results.length] += 1;
  });
  
  // 找最高分
  let maxIdx = 0;
  let maxVal = 0;
  scores.forEach((v, i) => {
    if (v > maxVal) { maxVal = v; maxIdx = i; }
  });
  
  // 避免平局
  const tied = scores.filter(v => v === maxVal).length;
  if (tied > 1) {
    const indices = scores.map((v,i) => v === maxVal ? i : -1).filter(i => i >= 0);
    maxIdx = indices[answers.length % indices.length];
  }
  
  return results[maxIdx];
}

// 显示结果
function showResult() {
  const oldScreen = document.getElementById('screen-q');
  if (oldScreen) oldScreen.remove();
  const nav = document.querySelector('.bottom-nav');
  if (nav) nav.remove();
  
  const r = calcResult();
  
  document.getElementById('screen-result').classList.add('active');
  document.getElementById('result-content').innerHTML = `
    <div class="result-badge">测试结果</div>
    <div class="result-avatar">
      <div class="result-avatar-inner">${r.emoji}</div>
    </div>
    <h2>${r.name}</h2>
    <p class="result-subtitle">${r.title}</p>
    <div class="result-match">
      <div class="match-title">匹配度</div>
      <div class="match-bar">
        <div class="match-fill" style="width:0%" data-width="${r.match}%"></div>
      </div>
      <div class="match-text">${r.match}% 匹配</div>
    </div>
    <div class="result-desc">${r.desc}</div>
    <div class="result-tags">
      ${r.tags.map(t => `<span class="result-tag"># ${t}</span>`).join('')}
    </div>
    <div class="btn-group">
      <button class="btn-retry" onclick="retry()">再测一次 🔄</button>
      <button class="btn-share" onclick="shareResult()">分享给朋友 📤</button>
    </div>
  `;
  
  // 动画填充匹配度
  setTimeout(() => {
    const fill = document.querySelector('.match-fill');
    if (fill) fill.style.width = fill.dataset.width + '%';
  }, 100);
}

// 重试
function retry() {
  answers = [];
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-cover').classList.add('active');
}

// 分享
function shareResult() {
  const r = calcResult();
  const text = `我测出来是【${r.name}】！${r.title}！太准了！你也来试试？`;
  if (navigator.share) {
    navigator.share({ title: '鬼畜全明星人格测试', text: text });
  } else {
    navigator.clipboard.writeText(text);
    alert('结果已复制到剪贴板！');
  }
}

// 初始化
createParticles();
